<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TotoFX Test Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .controls {
      position: relative;
      z-index: 10;
      padding: 20px 40px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .controls button {
      padding: 10px 20px;
      border: 1px solid #4a4a6a;
      border-radius: 8px;
      background: #2a2a4a;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .controls button:hover {
      background: #3a3a5a;
    }

    .controls h1 {
      font-size: 18px;
      font-weight: 600;
      margin-right: auto;
      color: #8888cc;
    }

    .card-grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      padding: 20px;
      border: 1px solid #3a3a5a;
      border-radius: 12px;
      background: rgba(30, 30, 55, 0.9);
      backdrop-filter: blur(4px);
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #6a6a9a;
    }

    .card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #aaaadd;
    }

    .card p {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }

    .card code {
      font-size: 11px;
      color: #6a9955;
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card .trigger-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      border: 1px solid #4a4a6a;
      border-radius: 6px;
      background: #2a2a4a;
      color: #ccc;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .card .trigger-btn:hover {
      background: #3a3a5a;
    }

    .persist-toggle {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      border: 1px solid #4a6a4a;
      border-radius: 6px;
      background: #2a4a2a;
      color: #aaddaa;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .persist-toggle.active {
      background: #4a6a4a;
      border-color: #6a9a6a;
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div class="controls">
    <h1>TotoFX Test Drive</h1>
    <button id="rise-all">Rise All</button>
    <button id="fall-all">Fall All</button>
  </div>

  <div class="card-grid" id="card-grid"></div>

  <!-- Load the full bundle (includes engine, FX, dotgrid, everything) -->
  <script src="dist/toto-fx.min.js"></script>
  <!-- Load plugins -->
  <script src="dist/plugins/thud.min.js"></script>
  <script src="dist/plugins/cute.min.js"></script>
  <script src="dist/plugins/death.min.js"></script>
  <script src="dist/plugins/creation.min.js"></script>
  <script src="dist/plugins/in-progress.min.js"></script>

  <script>
    // =========================================================
    // Card data
    // =========================================================
    var cards = [
      { id: 'card-1', title: 'Anime Slam',      cat: 'action',  style: 'thud',     variant: 'anime-slam',    type: 'oneshot', dotgrid: 'ripple' },
      { id: 'card-2', title: 'Meteor',           cat: 'action',  style: 'thud',     variant: 'meteor',        type: 'oneshot', dotgrid: 'crater' },
      { id: 'card-3', title: 'Confetti',         cat: 'action',  style: 'cute',     variant: 'confetti',      type: 'oneshot', dotgrid: 'ripple' },
      { id: 'card-4', title: 'Sparkle',          cat: 'action',  style: 'cute',     variant: 'sparkle',       type: 'oneshot', dotgrid: 'ripple' },
      { id: 'card-5', title: 'Explode',          cat: 'action',  style: 'destroy',    variant: 'explode',       type: 'oneshot', dotgrid: 'nuclear' },
      { id: 'card-6', title: 'Lightning',        cat: 'action',  style: 'destroy',    variant: 'lightning',     type: 'oneshot', dotgrid: 'crater' },
      { id: 'card-7', title: 'Slam Down',        cat: 'enter',   style: 'dramatic', variant: 'slam-down',     type: 'oneshot', dotgrid: 'ripple' },
      { id: 'card-8', title: 'Portal',           cat: 'enter',   style: 'dramatic', variant: 'portal',        type: 'oneshot', dotgrid: 'ripple' },
      { id: 'card-9', title: 'Glow (persist)',    cat: 'persist', style: 'ambient',  variant: 'glow',          type: 'persist', dotgrid: 'ripple' },
      { id: 'card-10', title: 'Particle Orbit',  cat: 'persist', style: 'rich',     variant: 'particle-orbit', type: 'persist', dotgrid: 'ripple' },
    ];

    // =========================================================
    // Render cards into the grid
    // =========================================================
    function renderCards() {
      var grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      cards.forEach(function (c) {
        var div = document.createElement('div');
        div.className = 'card';
        div.setAttribute('data-id', c.id);
        div.innerHTML =
          '<h3>' + c.title + '</h3>' +
          '<p>' + c.cat + ' / ' + c.style + ' / ' + c.variant + '</p>' +
          '<code>' + c.type + '</code><br>' +
          (c.type === 'persist'
            ? '<button class="persist-toggle" data-card="' + c.id + '">Toggle</button>'
            : '<button class="trigger-btn" data-card="' + c.id + '">Trigger</button>');
        grid.appendChild(div);
      });
    }

    renderCards();

    // =========================================================
    // Engine setup
    // =========================================================
    var engine = TotoFX.createEngine({
      resolveElement: function (key) {
        return document.querySelector('[data-id="' + key + '"]');
      },
      debug: true,
    });

    // Install all plugins
    TotoFXThud.install(engine);
    TotoFXCute.install(engine);
    TotoFXDeath.install(engine);
    TotoFXCreation.install(engine);
    TotoFXInProgress.install(engine);

    engine.init();

    // =========================================================
    // Dotgrid setup
    // =========================================================
    var grid = TotoFX.createDotgrid({
      container: '#bg',
      dotSize: 28,
      fontSize: 16,
      baseChar: '\u00b7',
      baseOpacity: 0.15,
      baseColor: [100, 100, 160],
      densityDecay: 0.985,
      velDecay: 0.92,
    });
    grid.init();

    // Wire FX to dotgrid
    TotoFX.FX.setDotgrid(grid);

    // =========================================================
    // Helper: get center of a card element
    // =========================================================
    function getCardCenter(el) {
      var rect = el.getBoundingClientRect();
      return { cx: rect.left + rect.width / 2, cy: rect.top + rect.height / 2 };
    }

    // =========================================================
    // Helper: fire dotgrid effect at card position
    // =========================================================
    function fireDotgridEffect(el, type) {
      var pos = getCardCenter(el);
      switch (type) {
        case 'ripple':
          TotoFX.FX.doDotgridRipple(pos.cx, pos.cy, { radius: 200, push: 10, density: 0.6 });
          break;
        case 'crater':
          TotoFX.FX.doDotgridCrater(pos.cx, pos.cy, 100, 1, { cracks: 6 });
          break;
        case 'nuclear':
          TotoFX.FX.doDotgridNuclear(pos.cx, pos.cy, { blastRadius: 250 });
          break;
      }
    }

    // =========================================================
    // Track persistent animation state
    // =========================================================
    var persistState = {};

    // =========================================================
    // Click handler delegation
    // =========================================================
    document.getElementById('card-grid').addEventListener('click', function (e) {
      var btn = e.target.closest('.trigger-btn, .persist-toggle');
      if (!btn) return;

      var cardId = btn.getAttribute('data-card');
      var cardData = cards.find(function (c) { return c.id === cardId; });
      if (!cardData) return;

      var el = document.querySelector('[data-id="' + cardId + '"]');
      if (!el) return;

      if (cardData.type === 'persist') {
        // Toggle persistent animation
        if (persistState[cardId]) {
          engine.clear(cardData.cat, cardId);
          persistState[cardId] = false;
          btn.classList.remove('active');
          btn.textContent = 'Toggle';
        } else {
          engine.set(cardData.cat, cardId, { style: cardData.style, variant: cardData.variant });
          persistState[cardId] = true;
          btn.classList.add('active');
          btn.textContent = 'Stop';
          fireDotgridEffect(el, cardData.dotgrid);
        }
      } else {
        // One-shot animation
        engine.play(cardData.cat, el, {
          params: { style: cardData.style, variant: cardData.variant },
        });
        fireDotgridEffect(el, cardData.dotgrid);
      }
    });

    // =========================================================
    // Rise All — clear and re-create cards with enter animations
    // =========================================================
    document.getElementById('rise-all').addEventListener('click', function () {
      // Clear any persistent animations
      Object.keys(persistState).forEach(function (key) {
        if (persistState[key]) {
          var cardData = cards.find(function (c) { return c.id === key; });
          if (cardData) engine.clear(cardData.cat, key);
          persistState[key] = false;
        }
      });

      // Remove cards
      document.getElementById('card-grid').innerHTML = '';

      // Small delay to let removal finish, then re-create with enter animations
      setTimeout(function () {
        renderCards();

        // Animate each card entering with staggered timing
        var enterVariants = ['slam-down', 'portal', 'scale-bounce', 'materialize', 'glitch-in',
                             'fade-in', 'slide-in', 'bounce-in', 'grow', 'rise'];
        var allCards = document.querySelectorAll('.card');
        allCards.forEach(function (el, i) {
          setTimeout(function () {
            var variant = enterVariants[i % enterVariants.length];
            // Determine style based on variant
            var style = 'dramatic';
            if (['fade-in', 'slide-in', 'unfold', 'typewriter', 'rise'].indexOf(variant) >= 0) {
              style = 'subtle';
            } else if (['bounce-in', 'grow', 'confetti-drop', 'sparkle-trail', 'butterfly-carry'].indexOf(variant) >= 0) {
              style = 'fun';
            }
            engine.play('enter', el, {
              params: { style: style, variant: variant },
            });
            fireDotgridEffect(el, 'ripple');
          }, i * 120);
        });
      }, 200);
    });

    // =========================================================
    // Fall All — destroy all cards with destroy animations
    // =========================================================
    document.getElementById('fall-all').addEventListener('click', function () {
      var destroyVariants = ['explode', 'lightning', 'incinerate', 'shredder', 'guillotine',
                             'sniper', 'eaten', 'steamroller', 'piranhas', 'woodchipper'];
      var allCards = document.querySelectorAll('.card');
      allCards.forEach(function (el, i) {
        setTimeout(function () {
          var variant = destroyVariants[i % destroyVariants.length];
          engine.play('action', el, {
            params: { style: 'destroy', variant: variant },
          });
          var dotgridType = (variant === 'explode') ? 'nuclear' : 'crater';
          fireDotgridEffect(el, dotgridType);
        }, i * 150);
      });
    });
  </script>
</body>
</html>
