<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TotoFX Test Drive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
    }
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .controls {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 12px;
      padding: 24px 40px 0;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 10px 20px;
      border: 1px solid #5a5a8a;
      border-radius: 8px;
      background: rgba(60, 40, 100, 0.7);
      color: #d0d0ff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .controls button:hover {
      background: rgba(80, 60, 130, 0.9);
    }
    .cards {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 220px);
      grid-auto-rows: 80px;
      gap: 16px;
      padding: 24px 40px 40px;
    }
    .card {
      padding: 20px 24px;
      border: 1px solid #3a3a5a;
      border-radius: 10px;
      background: rgba(30, 30, 55, 0.9);
      color: #e0e0e0;
      cursor: pointer;
      min-height: 80px;
      position: relative;
      user-select: none;
    }
    .card .label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    .card .title {
      font-size: 15px;
      font-weight: 500;
    }
    h1 {
      position: relative;
      z-index: 2;
      padding: 32px 40px 0;
      font-size: 22px;
      font-weight: 600;
      color: #c0c0e0;
    }
    .status {
      position: relative;
      z-index: 2;
      padding: 8px 40px;
      font-size: 13px;
      color: #777;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <div id="bg"></div>

  <h1>TotoFX Test Drive</h1>
  <div class="status" id="status"></div>

  <div class="controls">
    <button onclick="riseAll()">Rise All</button>
    <button onclick="fallAll()">Fall All</button>
  </div>

  <div class="cards" id="card-container">
    <!-- Cards are created dynamically -->
  </div>

  <!-- Core -->
  <script src="dist/toto-fx.min.js"></script>
  <!-- Plugins -->
  <script src="dist/plugins/thud.min.js"></script>
  <script src="dist/plugins/cute.min.js"></script>
  <script src="dist/plugins/death.min.js"></script>
  <script src="dist/plugins/creation.min.js"></script>
  <script src="dist/plugins/in-progress.min.js"></script>

  <script>
    // Card definitions — each card demos a different animation
    var cardDefs = [
      { id: 'card-1', label: 'Action / Thud', title: 'Anime Slam',       action: 'anime-slam',  style: 'thud',    category: 'action',  dotgrid: 'ripple' },
      { id: 'card-2', label: 'Action / Thud', title: 'Meteor',           action: 'meteor',      style: 'thud',    category: 'action',  dotgrid: 'crater' },
      { id: 'card-3', label: 'Action / Cute', title: 'Confetti',         action: 'confetti',    style: 'cute',    category: 'action',  dotgrid: 'ripple' },
      { id: 'card-4', label: 'Action / Cute', title: 'Sparkle',          action: 'sparkle',     style: 'cute',    category: 'action',  dotgrid: 'ripple' },
      { id: 'card-5', label: 'Destroy',       title: 'Explode',          action: 'explode',     style: 'destroy', category: 'action',  dotgrid: 'nuclear' },
      { id: 'card-6', label: 'Destroy',       title: 'Lightning',        action: 'lightning',   style: 'destroy', category: 'action',  dotgrid: 'crater' },
      { id: 'card-7', label: 'Enter',         title: 'Slam Down',        action: 'slam-down',   style: 'dramatic',category: 'enter',   dotgrid: 'ripple' },
      { id: 'card-8', label: 'Enter',         title: 'Portal',           action: 'portal',      style: 'dramatic',category: 'enter',   dotgrid: 'ripple' },
      { id: 'card-9', label: 'Persist',       title: 'Glow (toggle)',    action: 'glow',        style: 'ambient', category: 'persist', dotgrid: 'ripple' },
      { id: 'card-10',label: 'Persist',       title: 'Particle Orbit (toggle)', action: 'particle-orbit', style: 'rich', category: 'persist', dotgrid: 'ripple' },
    ];

    // Track persist toggle state
    var persistState = {};

    // -- Build card DOM --
    function createCardElements() {
      var container = document.getElementById('card-container');
      container.innerHTML = '';
      cardDefs.forEach(function (def) {
        var card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-id', def.id);
        card.innerHTML = '<div class="label">' + def.label + '</div><div class="title">' + def.title + '</div>';
        container.appendChild(card);
      });
    }

    // -- Create engine --
    var engine = TotoFX.createEngine({
      resolveElement: function (key) {
        return document.querySelector('[data-id="' + key + '"]');
      },
      debug: true,
    });

    // -- Install all plugins --
    engine.use(TotoFXThud);
    engine.use(TotoFXCute);
    engine.use(TotoFXDeath);
    engine.use(TotoFXCreation);
    engine.use(TotoFXInProgress);

    // -- Set up dotgrid --
    var grid = TotoFX.createDotgrid({
      container: '#bg',
      baseOpacity: 0.15,
      baseColor: [100, 100, 160],
    });
    grid.init();

    // -- Wire FX to dotgrid --
    TotoFX.FX.setDotgrid(grid);

    // -- Init engine --
    engine.init();

    // -- Build initial cards --
    createCardElements();

    // -- Status helper --
    function showStatus(msg) {
      var el = document.getElementById('status');
      el.textContent = msg;
      clearTimeout(el._timer);
      el._timer = setTimeout(function () { el.textContent = ''; }, 3000);
    }

    // -- Fire dotgrid effect at card position --
    function fireDotgrid(card, type) {
      var rect = card.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;

      if (type === 'ripple') {
        TotoFX.FX.doDotgridRipple(cx, cy, { radius: 200, push: 10, density: 0.6 });
      } else if (type === 'crater') {
        TotoFX.FX.doDotgridCrater(cx, cy, 100, 1, { cracks: 6, crackLength: 220 });
      } else if (type === 'nuclear') {
        TotoFX.FX.doDotgridNuclear(cx, cy, { blastRadius: 250 });
      }
    }

    // -- Click handler --
    document.getElementById('card-container').addEventListener('click', function (e) {
      var card = e.target.closest('.card');
      if (!card) return;

      var id = card.getAttribute('data-id');
      var def = cardDefs.find(function (d) { return d.id === id; });
      if (!def) return;

      if (def.category === 'persist') {
        // Toggle persistent animation
        if (persistState[id]) {
          engine.clear('persist', id);
          persistState[id] = false;
          showStatus('Cleared persist: ' + def.action + ' on ' + id);
        } else {
          engine.set('persist', id, { style: def.style, variant: def.action });
          persistState[id] = true;
          showStatus('Set persist: ' + def.action + ' on ' + id);
        }
        fireDotgrid(card, def.dotgrid);
      } else if (def.category === 'enter') {
        // Play enter animation
        engine.play('enter', card, {
          params: { style: def.style, variant: def.action },
        });
        fireDotgrid(card, def.dotgrid);
        showStatus('Playing enter: ' + def.action);
      } else {
        // Play action animation (thud, cute, destroy)
        engine.play('action', card, {
          params: { style: def.style, variant: def.action },
        });
        fireDotgrid(card, def.dotgrid);
        showStatus('Playing action: ' + def.style + '/' + def.action);
      }
    });

    // -- Rise All: recreate cards with enter animations --
    function riseAll() {
      persistState = {};
      createCardElements();
      showStatus('Rising all cards...');

      // Small delay to let DOM settle, then play enter animations
      var enterStyles = ['dramatic', 'dramatic', 'subtle', 'fun', 'subtle'];
      var enterVariants = ['slam-down', 'portal', 'fade-in', 'bounce-in', 'rise'];

      setTimeout(function () {
        var cards = document.querySelectorAll('.card');
        cards.forEach(function (card, i) {
          var styleIdx = i % enterStyles.length;
          setTimeout(function () {
            engine.play('enter', card, {
              params: { style: enterStyles[styleIdx], variant: enterVariants[styleIdx] },
            });
            fireDotgrid(card, 'ripple');
          }, i * 120);
        });
      }, 50);
    }

    // -- Fall All: destroy all cards with death animations --
    function fallAll() {
      persistState = {};
      showStatus('Destroying all cards...');

      var destroyVariants = ['explode', 'lightning', 'incinerate', 'shredder', 'eaten'];
      var cards = document.querySelectorAll('.card');

      cards.forEach(function (card, i) {
        var variant = destroyVariants[i % destroyVariants.length];
        setTimeout(function () {
          engine.play('action', card, {
            params: { style: 'destroy', variant: variant },
          });
          fireDotgrid(card, i % 2 === 0 ? 'nuclear' : 'crater');
        }, i * 200);
      });
    }
  </script>
</body>
</html>
