<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TotoFX × Three.js — Nuke Drop</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; background: #0a0c10; font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; color: #d8dde6; }
  #three-canvas { position: fixed; inset: 0; z-index: 0; display: block; width: 100%; height: 100%; }
  #bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    padding: 14px 16px; border: 1px solid #2a2f3a;
    background: rgba(8, 10, 14, 0.8); border-radius: 10px;
    backdrop-filter: blur(6px); font-size: 12px; line-height: 1.5; max-width: 280px;
  }
  .hud h1 { margin: 0 0 4px; font-size: 13px; letter-spacing: 0.1em; color: #ffd86a; }
  .hud p { margin: 0; color: #8892a0; }
  .hud .key { color: #ffa070; }
  .hud button {
    margin-top: 8px; padding: 8px 12px;
    background: #1a1408; color: #ffc060;
    border: 1px solid #5a3810; border-radius: 6px;
    font: inherit; cursor: pointer;
  }
  .hud button:hover { background: #2a1a10; }
  .hud label { display: flex; align-items: center; gap: 6px; color: #a4aec5; }
  .fps { position: fixed; bottom: 12px; right: 14px; z-index: 10; font-size: 11px; color: #5a6070; letter-spacing: 0.08em; }

  @keyframes fx-shake-light { 0%,100%{transform:translate(0,0)} 10%{transform:translate(-3px,2px)} 25%{transform:translate(4px,-2px)} 40%{transform:translate(-2px,3px)} 55%{transform:translate(3px,1px)} 70%{transform:translate(-3px,-2px)} 85%{transform:translate(2px,2px)} }
  @keyframes fx-shake-heavy { 0%,100%{transform:translate(0,0)} 8%{transform:translate(-14px,7px) rotate(-0.7deg)} 22%{transform:translate(15px,-8px) rotate(0.8deg)} 38%{transform:translate(-10px,10px) rotate(-0.5deg)} 54%{transform:translate(11px,5px) rotate(0.6deg)} 70%{transform:translate(-8px,-7px) rotate(-0.4deg)} 86%{transform:translate(7px,8px) rotate(0.3deg)} }
  body.shaking       { animation: fx-shake-light 450ms cubic-bezier(.36,.07,.19,.97) both; }
  body.shaking-heavy { animation: fx-shake-heavy 900ms cubic-bezier(.36,.07,.19,.97) both; }
</style>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="bg"></div>
  <div class="hud">
    <h1>☢ NUCLEAR</h1>
    <p>Nuke drops. City levels. Everyone disappears.</p>
    <p><span class="key">space</span> / click — drop</p>
    <button id="strike">DROP THE BOMB</button>
    <label><input id="auto" type="checkbox" checked /> auto-loop</label>
  </div>
  <div class="fps" id="fps">—</div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script src="../../dist/toto-fx.min.js"></script>
  <script type="module">
    import * as THREE from 'three';

    const engine = TotoFX.createEngine({ debug: false });
    const grid = TotoFX.createDotgrid({
      container: '#bg', dotSize: 26, fontSize: 15,
      baseOpacity: 0.2, baseColor: [170, 160, 140],
    });
    grid.init();
    TotoFX.FX.setDotgrid(grid);
    engine.setDotgrid(grid);
    engine.init();

    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.setClearColor(0x0a0c10, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0c10, 0.008);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 400);
    camera.position.set(0, 18, 55);
    camera.lookAt(0, 4, 0);

    // sky gradient as dark dusk
    {
      const g = new THREE.BufferGeometry();
      const N = 1200;
      const pos = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const r = 180 + Math.random() * 180;
        const t = Math.random() * Math.PI * 2;
        const p = Math.acos(2 * Math.random() - 1);
        pos[i*3+0] = r * Math.sin(p) * Math.cos(t);
        pos[i*3+1] = Math.abs(r * Math.sin(p) * Math.sin(t)) + 40;
        pos[i*3+2] = r * Math.cos(p);
      }
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x6080a0, size: 0.6, transparent: true, opacity: 0.5 })));
    }

    // ground
    scene.add(new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshStandardMaterial({ color: 0x2a2420, roughness: 0.95 })
    )).rotation.x = -Math.PI / 2;
    const gh = new THREE.GridHelper(500, 100, 0x3a3428, 0x201810);
    gh.position.y = 0.01; scene.add(gh);

    scene.add(new THREE.HemisphereLight(0x8890a8, 0x201810, 0.5));
    const sun = new THREE.DirectionalLight(0xffe0b0, 0.6);
    sun.position.set(-30, 40, 20); scene.add(sun);

    // city: grid of buildings
    const buildings = [];
    const BCOLS = 7, BROWS = 5;
    for (let cx = 0; cx < BCOLS; cx++) {
      for (let cz = 0; cz < BROWS; cz++) {
        const x = (cx - (BCOLS - 1) / 2) * 5 + (Math.random() - 0.5);
        const z = (cz - (BROWS - 1) / 2) * 5 + (Math.random() - 0.5) - 5;
        const h = 3 + Math.random() * 10;
        const w = 2 + Math.random() * 1.2;
        const d = 2 + Math.random() * 1.2;
        const emissive = Math.random() < 0.6 ? 0x5a4a2a : 0x2a2015;
        const b = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: 0x4a4238, emissive, emissiveIntensity: 0.5, roughness: 0.9 })
        );
        b.position.set(x, h / 2, z);
        scene.add(b);
        buildings.push({ mesh: b, v: new THREE.Vector3(), av: new THREE.Vector3(), alive: true, baseY: h / 2 });
      }
    }

    // missile (cylindrical bomb with flame)
    const missile = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 1.8, 16),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.7 })
    );
    body.rotation.x = Math.PI;
    missile.add(body);
    const fins = new THREE.Mesh(
      new THREE.ConeGeometry(0.6, 1, 4),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5 })
    );
    fins.position.y = 1;
    missile.add(fins);
    const flame = new THREE.Mesh(
      new THREE.ConeGeometry(0.5, 1.8, 12),
      new THREE.MeshBasicMaterial({ color: 0xff9040, transparent: true, opacity: 0.9 })
    );
    flame.position.y = -1.3;
    flame.rotation.x = Math.PI;
    missile.add(flame);
    const missileLight = new THREE.PointLight(0xff7020, 4, 30, 2);
    missile.add(missileLight);
    missile.visible = false;
    scene.add(missile);

    // mushroom cloud particles (3D)
    const mushroomGroup = new THREE.Group();
    scene.add(mushroomGroup);
    function spawnMushroom(x, z) {
      const count = 220;
      const geo = new THREE.BufferGeometry();
      const p = new Float32Array(count * 3);
      const v = [];
      for (let i = 0; i < count; i++) {
        p[i*3+0] = x + (Math.random() - 0.5) * 4;
        p[i*3+1] = 0.5;
        p[i*3+2] = z + (Math.random() - 0.5) * 4;
        const ang = Math.random() * Math.PI * 2;
        const r = Math.random();
        v.push(new THREE.Vector3(
          Math.cos(ang) * r * 3 * (0.5 + Math.random()),
          6 + Math.random() * 14,
          Math.sin(ang) * r * 3 * (0.5 + Math.random())
        ));
      }
      geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
      const mat = new THREE.PointsMaterial({
        color: 0xffc080, size: 2.2, transparent: true, opacity: 1,
        depthWrite: false, blending: THREE.AdditiveBlending,
      });
      const pts = new THREE.Points(geo, mat);
      pts.userData = { velocities: v, born: performance.now(), life: 3500, phase: 'rise' };
      mushroomGroup.add(pts);
    }
    function updateMushroom(dt, now) {
      for (let i = mushroomGroup.children.length - 1; i >= 0; i--) {
        const pts = mushroomGroup.children[i];
        const age = now - pts.userData.born;
        if (age > pts.userData.life) {
          mushroomGroup.remove(pts);
          pts.geometry.dispose(); pts.material.dispose();
          continue;
        }
        const pos = pts.geometry.attributes.position.array;
        const v = pts.userData.velocities;
        const tNorm = age / pts.userData.life;
        for (let j = 0; j < v.length; j++) {
          pos[j*3+0] += v[j].x * dt;
          pos[j*3+1] += v[j].y * dt;
          pos[j*3+2] += v[j].z * dt;
          // after rising, spread outward (mushroom cap)
          if (pos[j*3+1] > 18) {
            v[j].y *= 0.9;
            v[j].x *= 1.02;
            v[j].z *= 1.02;
          }
          v[j].y -= 2.5 * dt;
          v[j].multiplyScalar(0.995);
        }
        pts.geometry.attributes.position.needsUpdate = true;
        pts.material.opacity = Math.max(0, 1 - tNorm * 1.1);
        pts.material.size = 2.2 + tNorm * 4;
      }
    }

    // shockwave ring
    const rings = [];
    function spawnShockRing(x, z) {
      const g = new THREE.RingGeometry(0.5, 1.4, 80);
      const m = new THREE.MeshBasicMaterial({
        color: 0xfff4c0, transparent: true, opacity: 1,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const mesh = new THREE.Mesh(g, m);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x, 0.1, z);
      scene.add(mesh);
      rings.push({ mesh, born: performance.now(), life: 1800, max: 70 });
    }
    function updateRings(now) {
      for (let i = rings.length - 1; i >= 0; i--) {
        const r = rings[i];
        const t = (now - r.born) / r.life;
        if (t >= 1) {
          scene.remove(r.mesh); r.mesh.geometry.dispose(); r.mesh.material.dispose();
          rings.splice(i, 1); continue;
        }
        const s = 1 + t * r.max;
        r.mesh.scale.set(s, s, s);
        r.mesh.material.opacity = 0.9 * (1 - t);
      }
    }

    // missile state
    let missileState = 'idle';
    let missileStart = new THREE.Vector3();
    let missileEnd = new THREE.Vector3();
    let missileBorn = 0;
    const missileDur = 1400;

    function drop() {
      if (missileState !== 'idle') return;
      // target center of city
      missileEnd.set((Math.random() - 0.5) * 6, 0, -5 + (Math.random() - 0.5) * 6);
      missileStart.set(missileEnd.x - 30, 100, missileEnd.z - 20);
      missile.position.copy(missileStart);
      missile.lookAt(missileEnd);
      missile.visible = true;
      missileState = 'falling';
      missileBorn = performance.now();
    }

    function detonate() {
      const impact = missileEnd;
      const screen = worldToScreen(new THREE.Vector3(impact.x, 2, impact.z));
      const FX = TotoFX.FX;

      // 2D FX — nuclear character
      FX.doImpactFlash(true);
      FX.flashColor('#fff4d0', 300);
      setTimeout(() => FX.doScreenShake(true), 60);
      setTimeout(() => FX.doScreenShake(true), 450);
      FX.startSpeedLines(screen.x, screen.y, 'outward', 1200);
      FX.doDotgridNuclear(screen.x, screen.y, { blastRadius: 420, color: '#ffe0a0' });
      FX.doDotgridRipple(screen.x, screen.y, { radius: 520, push: 28, density: 0.9, color: '#ffc070' });
      FX.spawnParticles(screen.x, screen.y, {
        count: 120, spread: 22, upBias: 6, gravity: 0.12, life: 140,
        color: [255, 220, 160], chars: ['*', '+', '·', '✦', '◦'],
      });
      FX.spawnSmoke(screen.x, screen.y, 30);

      // 3D: mushroom cloud, shockwave ring, city destruction
      spawnMushroom(impact.x, impact.z);
      spawnShockRing(impact.x, impact.z);

      // blow buildings outward from impact
      for (const b of buildings) {
        if (!b.alive) continue;
        const delta = new THREE.Vector3().subVectors(b.mesh.position, impact);
        const dist = delta.length();
        const force = Math.max(0, 40 - dist * 1.1);
        delta.normalize();
        b.v.copy(delta).multiplyScalar(force);
        b.v.y = 8 + force * 0.35;
        b.av.set(
          (Math.random() - 0.5) * 6,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 6
        );
        b.alive = false; // flying now
      }

      // hide missile
      missile.visible = false;
      missileState = 'idle';
    }

    // rebuild city after a while
    let rebuildTimer = 0;
    function rebuild() {
      for (const b of buildings) {
        b.mesh.position.y = b.baseY;
        b.mesh.position.x = b.mesh.userData.ox ?? b.mesh.position.x;
        b.mesh.position.z = b.mesh.userData.oz ?? b.mesh.position.z;
        b.mesh.rotation.set(0, 0, 0);
        b.mesh.visible = true;
        b.v.set(0, 0, 0);
        b.av.set(0, 0, 0);
        b.alive = true;
      }
    }
    for (const b of buildings) { b.mesh.userData.ox = b.mesh.position.x; b.mesh.userData.oz = b.mesh.position.z; }

    function worldToScreen(v) {
      const p = v.clone().project(camera);
      return { x: (p.x * 0.5 + 0.5) * window.innerWidth, y: (-p.y * 0.5 + 0.5) * window.innerHeight };
    }

    document.getElementById('strike').addEventListener('click', drop);
    window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); drop(); } });
    canvas.addEventListener('click', drop);

    const autoEl = document.getElementById('auto');
    let lastAuto = 0;

    let lastNow = performance.now();
    const fpsEl = document.getElementById('fps');
    let fpsFrames = 0, fpsAccum = 0, fpsTime = 0;

    function frame(now) {
      const dt = Math.min(0.05, (now - lastNow) / 1000);
      lastNow = now;

      if (missileState === 'falling') {
        const t = (now - missileBorn) / missileDur;
        if (t >= 1) {
          detonate();
          rebuildTimer = now + 4000;
        } else {
          const tt = t * t;
          missile.position.lerpVectors(missileStart, missileEnd, tt);
          // rotate to face velocity
          const vel = new THREE.Vector3().subVectors(missileEnd, missileStart);
          missile.lookAt(missile.position.clone().add(vel));
          missile.rotateX(Math.PI / 2);
        }
      }

      // building physics
      for (const b of buildings) {
        if (b.alive) continue;
        b.mesh.position.addScaledVector(b.v, dt);
        b.v.y -= 22 * dt;
        b.v.multiplyScalar(0.995);
        b.mesh.rotation.x += b.av.x * dt;
        b.mesh.rotation.y += b.av.y * dt;
        b.mesh.rotation.z += b.av.z * dt;
        if (b.mesh.position.y < -10) b.mesh.visible = false;
      }

      if (rebuildTimer > 0 && now > rebuildTimer && missileState === 'idle') {
        rebuild();
        rebuildTimer = 0;
      }

      updateMushroom(dt, now);
      updateRings(now);

      // slow camera drift
      camera.position.x = Math.sin(now * 0.00006) * 8;
      camera.lookAt(0, 4, 0);

      if (autoEl.checked && missileState === 'idle' && rebuildTimer === 0 && now - lastAuto > 6000) {
        lastAuto = now;
        drop();
      }

      renderer.render(scene, camera);
      fpsFrames++; fpsAccum += dt;
      if (now - fpsTime > 500) {
        fpsEl.textContent = Math.round(fpsFrames / fpsAccum) + ' fps';
        fpsFrames = 0; fpsAccum = 0; fpsTime = now;
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight, false);
    });

    setTimeout(drop, 1000);
  </script>
</body>
</html>
